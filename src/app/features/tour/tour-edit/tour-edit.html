<div class="container">
  <h2>Edit Tour</h2>

  <input [value]="description()" (input)="onDescriptionInput($event)" />
  <input [value]="from()" (input)="onFromInput($event)" />
  <input [value]="to()" (input)="onToInput($event)" />
  <select [value]="transportType()" (change)="onTransportInput($event)">
    <option value="">Select transport</option>
    <option value="bike">Bike</option>
    <option value="hike">Hike</option>
    <option value="run">Run</option>
  </select>
  <input [value]="routeInformation()" (input)="onRouteInput($event)" />

  <button type="button" (click)="update()" [disabled]="!isValid()">
    Save
  </button>
</div>
