<div class="details">

  <!-- 🔥 NUR wenn nicht compact -->
  @if (!compact) {
    <h3>{{ tour.description }}</h3>

    <p>
      {{ tour.from }} → {{ tour.to }}
    </p>

    <p>
      <b>Transport:</b> {{ tour.transportType }}
    </p>
  }

  <!-- 🔥 IMMER anzeigen -->
  <p><b>Distance:</b> {{ tour.distance }} km</p>
  <p><b>Estimated Time:</b> {{ tour.time }} min</p>
  <p><b>Route Info:</b> {{ tour.routeInformation }}</p>

  <div class="actions">

    <button class="btn delete"
            (click)="service.delete(tour.id)">
      Delete
    </button>

    <button class="btn edit"
            (click)="service.selectedId.set(tour.id); router.navigate(['/edit'])">
      Edit
    </button>

    <button class="btn logs"
            (click)="service.selectedId.set(tour.id); router.navigate(['/logs'])">
      Logs
    </button>

  </div>

</div>
