<div class="container">
  <h2>Create Tour</h2>

  <form>
    <input
      type="text"
      placeholder="Enter tour name"
      [value]="name()"
      (input)="onNameInput($event)"
    />
    
    <input
      type="text"
      placeholder="Enter description"
      [value]="description()"
      (input)="onDescriptionInput($event)"
    />

    <input type="text" placeholder="From location" [value]="from()" (input)="onFromInput($event)" />

    <input type="text" placeholder="To location" [value]="to()" (input)="onToInput($event)" />

    <select (change)="onTransportInput($event)">
      <option value="">Select transport</option>
      <option value="bike">Bike</option>
      <option value="hike">Hike</option>
      <option value="run">Run</option>
    </select>

    <input
      type="text"
      placeholder="Route Information"
      [value]="routeInformation()"
      (input)="onRouteInput($event)"
    />

    <button type="button" (click)="create()" [disabled]="!isValid()">
      Create Tour
    </button>
  </form>
</div>
