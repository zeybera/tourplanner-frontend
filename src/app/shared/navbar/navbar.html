<nav class="navbar">

  <div class="left">

    <a routerLink="/tours" class="logo-link">
      <img src="assets/images/map-icon.png" class="nav-icon" />
      <span class="title">Tour Planner</span>
    </a>

    <a routerLink="/tours">My Tours</a>
    <a routerLink="/create">Create Tour</a>

  </div>

  <div class="right">
    @if (authService.isLoggedIn) {
      <span class="username">{{ authService.username }}</span>
      <button (click)="logout()">Logout</button>
    } @else {
      <button (click)="goToLogin()">Login</button>
    }
  </div>

</nav>
