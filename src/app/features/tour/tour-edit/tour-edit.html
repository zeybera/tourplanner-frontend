<div class="container">
  <h2>Edit Tour</h2>

  <div class="form">
    <div class="field">
      <label>Name</label>
      <input [value]="name()" (input)="onNameInput($event)" />
    </div>

    <div class="field">
      <label>Description</label>
      <input [value]="description()" (input)="onDescriptionInput($event)" />
    </div>

    <div class="field">
      <label>From</label>
      <div class="geocode-field">
        <input [value]="from()" (input)="onFromInput($event)" />
        <button type="button" (click)="searchFrom()">Search</button>
      </div>
    </div>

    @if (fromResults().length > 0) {
      <div class="geocode-results">
        @for (result of fromResults(); track result.label + result.coordinates[0] + result.coordinates[1]) {
          <button type="button" class="geocode-result" (click)="selectFrom(result)">
            <strong>{{ result.label }}</strong>
            <span>{{ result.neighbourhood || result.locality }} {{ result.country }}</span>
          </button>
        }
      </div>
    }

    <div class="field">
      <label>To</label>
      <div class="geocode-field">
        <input [value]="to()" (input)="onToInput($event)" />
        <button type="button" (click)="searchTo()">Search</button>
      </div>
    </div>

    @if (toResults().length > 0) {
      <div class="geocode-results">
        @for (result of toResults(); track result.label + result.coordinates[0] + result.coordinates[1]) {
          <button type="button" class="geocode-result" (click)="selectTo(result)">
            <strong>{{ result.label }}</strong>
            <span>{{ result.neighbourhood || result.locality }} {{ result.country }}</span>
          </button>
        }
      </div>
    }

    <div class="field">
      <label>Transport Type</label>
      <select [value]="transportType()" (change)="onTransportInput($event)">
        <option value="">Select transport</option>
        <option value="CAR">Car</option>
        <option value="BIKE">Bike</option>
        <option value="WALKING">Walking</option>
      </select>
    </div>

    <div class="field">
      <label>Route Info</label>
      <input [value]="routeInformation()" (input)="onRouteInput($event)" />
    </div>

    <div class="field">
      <label>Distance (km)</label>
      <input type="number" [value]="distance()" (input)="onDistanceInput($event)" min="1" />
    </div>

    <div class="field">
      <label>Time (min)</label>
      <input type="number" [value]="time()" (input)="onTimeInput($event)" min="1" />
    </div>

    <div class="actions">
      <button (click)="update()">Save</button>
    </div>
  </div>
</div>
