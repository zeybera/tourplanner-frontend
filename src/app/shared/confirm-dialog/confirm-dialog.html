<div class="confirm-backdrop" (click)="cancelled.emit()">
  <div class="confirm-dialog" (click)="$event.stopPropagation()">
    <h3>{{ title }}</h3>
    <p>{{ message }}</p>

    <div class="confirm-actions">
      <button type="button" class="secondary" (click)="cancelled.emit()">
        {{ cancelLabel }}
      </button>

      <button type="button" class="danger" (click)="confirmed.emit()">
        {{ confirmLabel }}
      </button>
    </div>
  </div>
</div>
