<div>
  <h3>
    @if (isEditMode()) {
      Edit Tour Log
    } @else {
      Create Tour Log
    }
  </h3>

  <input type="text" placeholder="Comment" [value]="comment()" (input)="onCommentInput($event)" />

  <input
    type="number"
    min="1"
    max="5"
    placeholder="Difficulty"
    [value]="difficulty()"
    (input)="onDifficultyInput($event)"
  />

  <input
    type="number"
    min="1"
    max="5"
    placeholder="Rating"
    [value]="rating()"
    (input)="onRatingInput($event)"
  />

  <button (click)="create()">
    @if (isEditMode()) {
      Update Log
    } @else {
      Create Log
    }
  </button>
</div>
