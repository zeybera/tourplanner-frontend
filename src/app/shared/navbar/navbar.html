<nav class="navbar">

  <div class="left">

    <a routerLink="/tours" class="logo-link">
      <img src="assets/images/map-icon.png" class="nav-icon" />
      <span class="title">Tour Planner</span>
    </a>

    <a routerLink="/tours">My Tours</a>
    <a routerLink="/create">Create Tour</a>

  </div>

  <div class="right">
    <ng-container *ngIf="authService.isLoggedIn; else loginBtn">
      <span class="username">{{ authService.username }}</span>
      <button (click)="authService.logout()">Logout</button>
    </ng-container>
    <ng-template #loginBtn>
      <button (click)="authService.login()">Login</button>
    </ng-template>
  </div>

</nav>
