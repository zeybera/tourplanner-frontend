<div class="details">
  <div class="tour-map-wrapper">
    <app-tour-map></app-tour-map>
  </div>

  @if (!compact) {
    <div class="details-header">
      <div>
        <h3>{{ tour.name }}</h3>
        <p class="details-route">{{ tour.fromLocation }} → {{ tour.toLocation }}</p>
      </div>

      <span class="transport-chip">{{ tour.transportType }}</span>
    </div>

    <p class="details-description">{{ tour.description }}</p>
  }

  <div class="details-stats">
    <div class="stat">
      <span>Distance</span>
      <strong>{{ tour.distance }} km</strong>
    </div>

    <div class="stat">
      <span>Estimated time</span>
      <strong>{{ tour.estimatedTime }} min</strong>
    </div>

    <div class="stat">
      <span>Popularity</span>
      <strong>{{ tour.popularity }}</strong>
    </div>

    <div class="stat">
      <span>Child friendliness</span>
      <strong>{{ tour.childFriendliness }}</strong>
    </div>
  </div>

  <div class="actions">

    <button class="btn delete"
            (click)="service.delete(tour.id)">
      Delete
    </button>

    <button class="btn edit"
            (click)="service.selectTour(tour.id); router.navigate(['/edit'])">
      Edit
    </button>

    <button class="btn logs"
            (click)="service.selectTour(tour.id); router.navigate(['/logs'])">
      Logs
    </button>

    <button class="btn export"
            (click)="exportTour()">
      Export
    </button>

  </div>

</div>
