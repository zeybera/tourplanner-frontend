<div class="container">

  <!-- LEFT: LIST -->
  <div class="left">
    <div class="list-header">
      <h2>My Tours</h2>
      <div class="icons">
        <button type="button" (click)="goToCreate()">＋</button>
        <button>★</button>
      </div>
    </div>
     <!-- LIST -->
    <app-tour-list></app-tour-list>
  </div>

  <!-- RIGHT: DETAILS -->
  <div class="right">




    <!-- DETAILS -->
    @if (service.selectedTour(); as tour) {
      <app-card>
        <app-tour-details [tour]="tour"></app-tour-details>
      </app-card>
    } @else {
      <p>Select a tour to see details</p>
    }

  </div>

</div>
