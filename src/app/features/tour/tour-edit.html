<div class="container">
  <h2>Edit Tour</h2>

  <input [value]="description()" (input)="description.set($any($event.target).value)" />
  <input [value]="from()" (input)="from.set($any($event.target).value)" />
  <input [value]="to()" (input)="to.set($any($event.target).value)" />
  <input [value]="transportType()" (input)="transportType.set($any($event.target).value)" />
  <input [value]="routeInformation()" (input)="routeInformation.set($any($event.target).value)" />

  <button (click)="update()">Save</button>
</div>
